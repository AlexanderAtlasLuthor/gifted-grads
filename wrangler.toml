# Cloudflare Pages configuration for Gifted Grads Events.
#
# Usage:
#   - Local dev:        npx wrangler pages dev -- npm run dev
#   - Apply migrations: npx wrangler d1 migrations apply DB --local   (local)
#                       npx wrangler d1 migrations apply DB --remote  (production)
#   - Set secrets:      npx wrangler pages secret put MANAGER_PASSWORD
#                       npx wrangler pages secret put RESEND_API_KEY
#
# The `DB` D1 binding and the `RESEND_FROM` / `ORGANIZER_EMAIL` plain vars
# can also be configured from the Cloudflare dashboard; this file is the
# source of truth for local development via `wrangler pages dev`.

name = "gifted-grads-events"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[vars]
# Using Resend's shared sender (onboarding@resend.dev) so we don't need
# to verify a custom domain. Tell IT to whitelist `onboarding@resend.dev`
# so the notifications don't get filtered as spam.
# When the dominio aainsurances.com is verified in Resend, change this
# back to "Gifted Grads <noreply@aainsurances.com>".
RESEND_FROM = "Gifted Grads <onboarding@resend.dev>"
ORGANIZER_EMAIL = "info@aainsurances.com"

# Donations — Stripe currency + dashboard goal. Adjust without redeploy
# from the Cloudflare Pages → Settings → Environment variables UI.
DONATION_CURRENCY = "usd"
DONATION_GOAL_CENTS = "500000"
# Absolute base URL used to build Stripe redirect URLs. Falls back to
# the request origin when empty (good for preview / local dev).
PUBLIC_BASE_URL = ""

# D1 binding. Replace `database_id` with the id printed by:
#   npx wrangler d1 create gifted-grads
[[d1_databases]]
binding = "DB"
database_name = "gifted-grads"
database_id = "1f16d1ab-b12f-4f1a-98af-4bfef669537d"
migrations_dir = "migrations"
