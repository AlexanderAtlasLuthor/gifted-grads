# Cloudflare Pages configuration for Gifted Grads Events.
#
# Usage:
#   - Local dev:        npx wrangler pages dev -- npm run dev
#   - Apply migrations: npx wrangler d1 migrations apply DB --local   (local)
#                       npx wrangler d1 migrations apply DB --remote  (production)
#   - Set secrets:      npx wrangler pages secret put MANAGER_PASSWORD
#                       npx wrangler pages secret put JOTFORM_WEBHOOK_SECRET
#
# The `DB` D1 binding and Jotform allowlist can also be configured from
# the Cloudflare dashboard; this file is the source of truth for local
# development via `wrangler pages dev`.

name = "gifted-grads-events"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[vars]
# CSV of Jotform Form IDs accepted by the webhook (insurance form).
JOTFORM_ALLOWED_FORM_IDS = "261465857224059"

# D1 binding. Replace `database_id` with the id printed by:
#   npx wrangler d1 create gifted-grads
[[d1_databases]]
binding = "DB"
database_name = "gifted-grads"
database_id = "1f16d1ab-b12f-4f1a-98af-4bfef669537d"
migrations_dir = "migrations"
